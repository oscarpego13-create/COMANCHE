name: Build COMANCHE (macOS)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: macOS VST3
    runs-on: macos-14

    steps:
      - name: Checkout COMANCHE
        uses: actions/checkout@v4

      - name: Clone iPlug2
        run: |
          git clone --depth=1 https://github.com/iPlug2/iPlug2.git ../iPlug2
          cd ../iPlug2
          git submodule update --init --recursive --depth=1

      - name: Download IPlug SDKs (VST3)
        run: |
          cd ../iPlug2/Dependencies/IPlug
          chmod +x download-iplug-sdks.sh
          ./download-iplug-sdks.sh

      - name: Copy font
        run: |
          mkdir -p resources/fonts
          cp ../iPlug2/Examples/IPlugEffect/resources/fonts/Roboto-Regular.ttf \
             resources/fonts/Roboto-Mono-Regular.ttf

      - name: Configure CMake
        run: |
          cmake -B build -G Xcode \
            -DIPLUG2_DIR=${{ github.workspace }}/../iPlug2 \
            -DIGRAPHICS_BACKEND=NANOVG \
            -DIGRAPHICS_RENDERER=METAL \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
            "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64" \
            -DIPLUG2_DISABLE_DEPRECATION_WARNINGS=ON \
            -DIPLUG_DEPLOY_PLUGINS=OFF

      - name: Build VST3
        run: cmake --build build --config Release --target COMANCHE-vst3 2>&1 | tee /tmp/build_log.txt; exit ${PIPESTATUS[0]}

      - name: Show build errors
        if: failure()
        run: |
          ERRORS=$(grep -E "error:|fatal error:" /tmp/build_log.txt | head -40 || tail -60 /tmp/build_log.txt)
          echo "$ERRORS"
          while IFS= read -r line; do echo "::error::$line"; done <<< "$ERRORS"

      - name: Show build output
        if: always()
        run: find build -name "*.vst3" 2>/dev/null | head -20 || echo "no vst3 found"

      - name: Collect artifact
        run: |
          mkdir -p dist
          find build -name "*.vst3" -exec cp -r {} dist/ \; 2>/dev/null || true
          ls -la dist/

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: COMANCHE-VST3-macOS
          path: dist/*.vst3
          if-no-files-found: warn
          retention-days: 30
