name: Build COMANCHE VST3

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: COMANCHE-macOS
            vst3_path: build/COMANCHE_artefacts/Release/VST3/COMANCHE.vst3
          - os: windows-latest
            artifact_name: COMANCHE-Windows
            vst3_path: build/COMANCHE_artefacts/Release/VST3/COMANCHE.vst3

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Remove macOS quarantine
        if: runner.os == 'macOS'
        run: xattr -cr "${{ matrix.vst3_path }}"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.vst3_path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: COMANCHE-macOS
          path: release/macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: COMANCHE-Windows
          path: release/Windows

      - name: Zip artifacts
        run: |
          cd release/macOS && zip -r ../../COMANCHE-macOS.zip . && cd ../..
          cd release/Windows && zip -r ../../COMANCHE-Windows.zip . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            COMANCHE-macOS.zip
            COMANCHE-Windows.zip
          generate_release_notes: true
